name: flutter_starter
description: Music player with AcoustID + MusicBrainz integration for identifying local music files.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State: Riverpod gives compile-safe providers, test overrides, and scales
  # without InheritedWidget boilerplate. Lighter than Bloc for this MVP; more
  # structure than raw Provider for growing feature modules.
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.17
  file_picker: ^8.1.7
  path: ^1.9.1
  path_provider: ^2.1.5
  idb_shim: ^2.6.6
  web: ^1.1.1
  permission_handler: ^11.4.0
  just_audio_background:
    path: packages/just_audio_background
  audio_service: ^0.18.18
  url_launcher: ^6.3.1
  http: ^1.2.2
  dynamic_color: ^1.7.0
  in_app_review: ^2.0.9
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  # Patched Android notification: colorized media style (dark tint with notificationColor).
  audio_service:
    path: packages/audio_service_patched

flutter:
  uses-material-design: true
  assets:
    - assets/audio/sample.mp3
    - assets/images/
